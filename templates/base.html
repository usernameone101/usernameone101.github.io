<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ config.title }}{% endblock title %}</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 2rem; color: #333; }
        header { border-bottom: 1px solid #eee; padding-bottom: 1rem; margin-bottom: 2rem; }
        nav a { margin-right: 1rem; color: #0056b3; text-decoration: none; font-weight: bold; }
        pre { padding: 1rem; border-radius: 4px; overflow-x: auto; }
        code { font-family: monospace; }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="{{ get_url(path="@/_index.md") }}">Home</a>
            <a href="{{ get_url(path="@/research/_index.md") }}">Research</a>
        </nav>
        <h1>{{ config.title }}</h1>
    </header>
    
    <main>
        {% block content %}{% endblock content %}
    </main>

    <footer style="margin-top: 3rem; border-top: 1px solid #eee; padding-top: 1rem; font-size: 0.9em; color: #666;">
        <p>&copy; 2026 {{ config.extra.author }}. Built with Zola.</p>
    </footer>
</body>
</html>
